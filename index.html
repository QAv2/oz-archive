<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Oz Archive</title>
  <meta name="description" content="A 3D navigable portfolio — walkable museum of software projects.">

  <link rel="stylesheet" href="css/boot.css">
  <link rel="stylesheet" href="css/hud.css">
  <link rel="stylesheet" href="css/tour.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; height: 100%; background: #0a0a0f; }
    #game-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- 3D Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Boot Screen -->
  <div id="boot-screen">
    <div id="boot-text"></div>
  </div>

  <!-- Door Overlay -->
  <div id="door-overlay" style="display: none;">
    <div class="door-label">RESTRICTED ACCESS</div>
  </div>

  <!-- HUD -->
  <div id="crosshair"></div>
  <div id="hud-prompt"></div>

  <!-- Exhibit Info Panel -->
  <div id="info-panel"></div>

  <!-- Detail Overlay -->
  <div id="overlay-panel"></div>

  <!-- CRT Toggle -->
  <button id="crt-toggle">CRT: ON</button>

  <!-- Mobile Fallback -->
  <div id="mobile-fallback"></div>

  <!-- Tour Mode (Mobile 3D) -->
  <div id="tour-fade"></div>
  <div id="tour-hud">
    <div id="tour-location"></div>
    <div id="tour-hint"></div>
  </div>
  <button id="tour-exhibit-btn">TAP TO INTERACT</button>
  <button id="tour-back-btn">&lt; BACK</button>
  <button id="tour-curator-btn">CURATOR</button>

  <!-- Portal Flash (floor — WorldView) -->
  <div id="portal-flash"></div>
  <!-- Portal Flash (ceiling — Device Spec) -->
  <div id="portal-sky-flash"></div>
  <!-- Exhibit Flash (per-exhibit color) -->
  <div id="exhibit-flash"></div>

  <!-- Entry Point -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
